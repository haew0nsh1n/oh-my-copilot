name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and Strict Doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run strict doctor
        run: omp doctor --strict
      - name: Run tests
        run: .venv/bin/python -m pytest -q || python -m pytest -q
      - name: Run E2E runtime parity
        run: python -m pytest tests/e2e/test_runtime_parity.py -q
