name: Auto Label

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label by Paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Summarize likely labels
        run: |
          echo 'label candidates:'
          git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD | sed 's#^# - #'
